# Aetherius — autonomous Minecraft agent swarm.
#
# Current architecture (post architecture-overhaul):
#   mongo                -> persistence for world-state-service
#   world-state-service  -> strategic memory (HTTP 3000 / WS 3001)
#   bot-server-manager   -> agent lifecycle + relay (WS 4000 upstream / TCP 4001 agents)
#   coordinator          -> conversational planner (HTTP 5000 / WS 5001)
#
# The old 3-tier orchestrator + squad-leader services have been removed.
# Secrets are passed through from the host environment / .env via ${VAR}.

services:
  mongo:
    image: mongo:7
    container_name: aetherius-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aetherius-network

  world-state-service:
    build:
      context: .
      dockerfile: packages/world-state-service/Dockerfile
    container_name: aetherius-world-state
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3000
      WS_PORT: 3001
      MONGO_URI: mongodb://mongo:27017/aetherius_world_state
    ports:
      - "3000:3000"
      - "3001:3001"
    healthcheck:
      # node-based check so we don't depend on curl being present in the slim image.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - aetherius-network

  coordinator:
    build:
      context: .
      dockerfile: packages/coordinator/Dockerfile
    container_name: aetherius-coordinator
    restart: unless-stopped
    depends_on:
      world-state-service:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      COORDINATOR_PORT: 5000
      COORDINATOR_WS_PORT: 5001
      WORLD_STATE_API_ADDRESS: http://world-state-service:3000
      MC_VERSION: ${MC_VERSION:-1.21.1}
      # Optional shared secret. When set, BSMs must present a matching token.
      CLUSTER_AUTH_TOKEN: ${CLUSTER_AUTH_TOKEN:-}
    ports:
      - "5000:5000"
      - "5001:5001"
    networks:
      - aetherius-network

  bot-server-manager:
    build:
      context: .
      dockerfile: packages/bot-server-manager/Dockerfile
    container_name: aetherius-bsm
    restart: unless-stopped
    depends_on:
      world-state-service:
        condition: service_healthy
      coordinator:
        condition: service_started
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BSM_WS_PORT: 4000
      BSM_AGENT_PORT: 4001
      COORDINATOR_ADDRESS: ws://coordinator:5001
      WORLD_STATE_API_ADDRESS: http://world-state-service:3000
      # Minecraft server the spawned agents connect to.
      MC_HOST: ${MC_HOST}
      MC_PORT: ${MC_PORT:-25565}
      MC_VERSION: ${MC_VERSION:-1.21.1}
      # Optional shared secret; presented to the coordinator and required from agents.
      CLUSTER_AUTH_TOKEN: ${CLUSTER_AUTH_TOKEN:-}
    ports:
      - "4000:4000"
      - "4001:4001"
    networks:
      - aetherius-network

  # Frontend is currently a stub — enable once packages/frontend ships a Dockerfile.
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: packages/frontend/Dockerfile
  #   container_name: aetherius-frontend
  #   restart: unless-stopped
  #   depends_on:
  #     - coordinator
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - aetherius-network

networks:
  aetherius-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
